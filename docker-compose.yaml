version: '3.8'

volumes:
  db_storage:
  n8n_storage:

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_GROUP_ID
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
      - EXECUTIONS_DATA_MAX_AGE=1
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_GROUP_ID
      - IMAP_USER
      - IMAP_PASSWORD
      - IMAP_HOST
    ports:
      - 5678:5678
    links:
      - postgres
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./init-data-n8n.sh:/docker-entrypoint.d/init-data-n8n.sh
    depends_on:
      postgres:
        condition: service_healthy

  n8n-init:
    image: docker.n8n.io/n8nio/n8n
    depends_on:
      - n8n
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=1000
      - EXECUTIONS_DATA_MAX_AGE=1
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_GROUP_ID
      - IMAP_USER
      - IMAP_PASSWORD
      - IMAP_HOST
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./init-data-n8n.sh:/docker-entrypoint.d/init-data-n8n.sh
      - ./workflows:/workflows
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/init-data-n8n.sh"]
